<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#ff8466"/>
      <stop offset="100%" stop-color="#c43d8a"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#ffa566"/>
      <stop offset="100%" stop-color="#e85f7a"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#ff7d8a"/>
      <stop offset="100%" stop-color="#9d3470"/>
    </radialGradient>
    <radialGradient id="g4" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#ffb866"/>
      <stop offset="100%" stop-color="#d05f3a"/>
    </radialGradient>
    <radialGradient id="g5" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#ff9466"/>
      <stop offset="100%" stop-color="#a83660"/>
    </radialGradient>

    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#fdedd2"/>
      <stop offset="100%" stop-color="#e89c5f"/>
    </radialGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <filter id="far" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
  </defs>

  <!-- ambient wash -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- distant figures, heavy blur -->
  <g filter="url(#far)" opacity="0.55">
    <ellipse cx="200" cy="540" rx="120" ry="280" fill="url(#g1)"/>
    <circle cx="200" cy="280" r="80" fill="#c43d8a"/>

    <ellipse cx="1390" cy="540" rx="120" ry="280" fill="url(#g4)"/>
    <circle cx="1390" cy="280" r="80" fill="#d05f3a"/>
  </g>

  <!-- foreground cluster of "tech bros" rendered as blob figures -->
  <g filter="url(#soft)" opacity="0.92">

    <!-- figure 1 -->
    <ellipse cx="430" cy="640" rx="150" ry="320" fill="url(#g1)"/>
    <circle cx="430" cy="290" r="105" fill="#c43d8a"/>

    <!-- figure 2 -->
    <ellipse cx="660" cy="660" rx="155" ry="335" fill="url(#g3)"/>
    <circle cx="660" cy="280" r="110" fill="#9d3470"/>

    <!-- figure 3 - center, slightly taller -->
    <ellipse cx="900" cy="640" rx="160" ry="345" fill="url(#g2)"/>
    <circle cx="900" cy="265" r="115" fill="#e85f7a"/>

    <!-- figure 4 -->
    <ellipse cx="1140" cy="660" rx="155" ry="335" fill="url(#g5)"/>
    <circle cx="1140" cy="285" r="108" fill="#a83660"/>

  </g>

  <!-- bottom blend so text reads cleanly on light backgrounds -->
  <rect width="1600" height="900" fill="url(#bg)" opacity="0.35"/>
</svg>
